name: Distributed URL Shortener CI


on:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven


      - name: Check Java Version
        run: java -version