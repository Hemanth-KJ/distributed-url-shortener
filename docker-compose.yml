services:

  postgres:

    image: postgres:18

    container_name: postgres-db

    environment:
      POSTGRES_DB: distributed_url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql

    restart: always


  redis:

    image: redis:7-alpine

    container_name: redis

    restart: always

    ports:
      - "6379:6379"


  kafka:

    image: apache/kafka:latest

    container_name: kafka

    restart: always

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  app:

    image: distributed-url-shortener

    container_name: distributed-url-shortener

    depends_on:
      - postgres
      - redis
      - kafka

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/distributed_url_shortener
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_DATA_REDIS_HOST: redis

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092


#    environment:
#      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/distributed_url_shortener
#      SPRING_DATASOURCE_USERNAME: postgres
#      SPRING_DATASOURCE_PASSWORD: Hemanth@6366
#      SPRING_DATA_REDIS_HOST: host.docker.internal
#      SPRING_KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092


volumes:

  postgres-data: